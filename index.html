<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRONJE LIGHTING Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <img src="/images/cronje-lighting-logo.png" alt="CRONJE LIGHTING Logo">
      <h1>Plan Your Lighting in 30 Seconds</h1>
      <p>Get the perfect LED setup for any room — fast & easy.</p>
      <a href="#calculator" class="btn-primary">Start Planning</a>
    </div>
  </section>

  <!-- Calculator Section -->
  <section id="calculator">
    <div class="calculator-container">
      <h2>Your Lighting Planner</h2>
      <form id="lighting-form">
        <div>
          <label for="length">Room Length (m)</label>
          <input type="number" id="length" placeholder="e.g., 5" required>
        </div>
        <div>
          <label for="width">Room Width (m)</label>
          <input type="number" id="width" placeholder="e.g., 4" required>
        </div>
        <div>
          <label for="height">Ceiling Height (m)</label>
          <input type="number" id="height" placeholder="e.g., 2.7">
        </div>
        <div>
          <label for="room-type">Room Type</label>
          <select id="room-type">
            <option>Bedroom</option>
            <option>Kitchen</option>
            <option>Living Room</option>
            <option>Bathroom</option>
            <option>Outdoor</option>
          </select>
        </div>
        <div style="grid-column: span 2;">
          <label for="brightness">Brightness Preference</label>
          <input type="range" id="brightness" min="1" max="10" value="7">
        </div>
        <div style="grid-column: span 2; text-align: center;">
          <button type="submit" class="btn-primary">Calculate My Lighting</button>
        </div>
      </form>

      <div id="results" class="hidden"></div>
    </div>
  </section>

  <!-- JavaScript -->
  <script src="script.js"></script>

</body>
</html>
