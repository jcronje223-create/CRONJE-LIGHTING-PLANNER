<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cronje Lighting Quote Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="hero">
    <div class="overlay">
      <header class="navbar">
        <h1 class="site-title">CRONJE LIGHTING</h1>
      </header>

      <main class="hero-content">
        <div class="calculator-card">
          <h2>Lighting Quote Calculator</h2>
          <p class="subtext">Fill in the details below to estimate your project cost.</p>

          <form id="calculatorForm">
            <div class="form-grid">
              <div class="form-group">
                <label for="roomType">Room Type</label>
                <select id="roomType" required>
                  <option value="">Select room type</option>
                  <option value="Bedroom">Bedroom</option>
                  <option value="Kitchen">Kitchen</option>
                  <option value="Living Room">Living Room</option>
                  <option value="Bathroom">Bathroom</option>
                  <option value="Dining Room">Dining Room</option>
                  <option value="Office">Office</option>
                  <option value="Outdoor Area">Outdoor Area</option>
                  <option value="Other">Other</option>
                </select>
              </div>

              <div class="form-group">
                <label for="length">Room Length (m)</label>
                <input type="number" id="length" min="1" step="0.1" placeholder="e.g. 5" required />
              </div>

              <div class="form-group">
                <label for="width">Room Width (m)</label>
                <input type="number" id="width" min="1" step="0.1" placeholder="e.g. 4" required />
              </div>

              <div class="form-group">
                <label for="lightCount">Number of Lights</label>
                <input type="number" id="lightCount" min="1" step="1" placeholder="e.g. 8" required />
              </div>

              <div class="form-group">
                <label for="fittingType">Fitting Type</label>
                <select id="fittingType" required>
                  <option value="">Select fitting type</option>
                  <option value="Standard Downlights">Standard Downlights</option>
                  <option value="Premium Downlights">Premium Downlights</option>
                  <option value="LED Strip">LED Strip</option>
                  <option value="Pendant Lights">Pendant Lights</option>
                  <option value="Outdoor Lights">Outdoor Lights</option>
                </select>
              </div>

              <div class="form-group">
                <label for="installationType">Installation Type</label>
                <select id="installationType" required>
                  <option value="">Select installation type</option>
                  <option value="New Installation">New Installation</option>
                  <option value="Replacement">Replacement</option>
                  <option value="Upgrade">Upgrade</option>
                </select>
              </div>
            </div>

            <div class="button-row">
              <button type="submit" id="calculateBtn">Calculate</button>
            </div>
          </form>

          <div id="quoteResult" class="quote-result hidden">
            <h3>Your Estimated Quote</h3>
            <p id="quoteAmount">R0</p>
            <p id="quoteBreakdown"></p>
            <button id="openQuotePopupBtn" class="secondary-btn">Get a Quote</button>
          </div>
        </div>
      </main>
    </div>
  </section>

  <!-- POPUP -->
  <div id="quotePopup" class="popup hidden">
    <div class="popup-content">
      <button id="closePopupBtn" class="close-btn">&times;</button>
      <h2>Request Your Quote</h2>
      <p class="subtext">Enter your contact details and any extra requirements.</p>

      <form id="quoteForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" required />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required />
        </div>

        <div class="form-group">
          <label for="phone">Telephone Number</label>
          <input type="tel" id="phone" required />
        </div>

        <div class="form-group">
          <label for="requirements">Additional Requirements</label>
          <textarea id="requirements" rows="4" placeholder="Anything else you'd like us to know?"></textarea>
        </div>

        <button type="submit" id="submitQuoteBtn">Submit Quote Request</button>
      </form>

      <p id="formStatus" class="status-text"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
